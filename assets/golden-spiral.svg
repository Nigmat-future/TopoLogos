<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Golden ratio spiral φ = 1.618">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e2436"/>
      <stop offset="60%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#080a12"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9A7B28"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Fibonacci squares (φ construction) -->
  <g fill="none" stroke="#D4AF37" opacity="0.12">
    <rect x="62" y="62" width="276" height="276" stroke-width="0.5"/>
    <rect x="62" y="62" width="170" height="170" stroke-width="0.6"/>
    <rect x="124" y="62" width="106" height="106" stroke-width="0.7"/>
    <rect x="124" y="124" width="66" height="66" stroke-width="0.8"/>
    <rect x="168" y="124" width="40" height="40" stroke-width="0.9"/>
    <rect x="168" y="156" width="26" height="26" stroke-width="1"/>
    <rect x="186" y="156" width="16" height="16" stroke-width="1.1"/>
    <rect x="186" y="168" width="10" height="10" stroke-width="1.2"/>
    <rect x="192" y="168" width="6" height="6" stroke-width="1.3"/>
  </g>

  <!-- Golden spiral — single continuous path -->
  <path d="M62 338
           A276 276 0 0 1 338 62
           A170 170 0 0 1 62 232
           A106 106 0 0 1 230 62
           A66 66 0 0 1 124 190
           A40 40 0 0 1 208 124
           A26 26 0 0 1 168 176
           A16 16 0 0 1 194 156
           A10 10 0 0 1 186 168
           A6 6 0 0 1 198 168"
        fill="none" stroke="url(#gold)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Inner glow along spiral -->
  <path d="M62 338
           A276 276 0 0 1 338 62
           A170 170 0 0 1 62 232
           A106 106 0 0 1 230 62
           A66 66 0 0 1 124 190
           A40 40 0 0 1 208 124
           A26 26 0 0 1 168 176
           A16 16 0 0 1 194 156
           A10 10 0 0 1 186 168
           A6 6 0 0 1 198 168"
        fill="none" stroke="#F4E4BC" stroke-width="0.8" opacity="0.35" stroke-linecap="round"/>

  <!-- φ symbol -->
  <g transform="translate(195, 172)" stroke="#F4E4BC" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="0" y1="-6" x2="0" y2="8"/>
    <line x1="-5" y1="0" x2="5" y2="0"/>
    <circle cx="0" cy="0" r="10" stroke="#D4AF37" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Corner ornaments -->
  <g fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.4">
    <path d="M24 24 H48 V36 H36 V48 H24 Z"/>
    <path d="M376 24 H352 V36 H364 V48 H376 Z"/>
    <path d="M24 376 H48 V364 H36 V352 H24 Z"/>
    <path d="M376 376 H352 V364 H364 V352 H376 Z"/>
  </g>
  <circle cx="24" cy="24" r="2.5" fill="#D4AF37" opacity="0.35"/>
  <circle cx="376" cy="24" r="2.5" fill="#D4AF37" opacity="0.35"/>
  <circle cx="24" cy="376" r="2.5" fill="#D4AF37" opacity="0.35"/>
  <circle cx="376" cy="376" r="2.5" fill="#D4AF37" opacity="0.35"/>
</svg>