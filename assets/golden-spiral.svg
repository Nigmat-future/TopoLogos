<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="marble" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="60%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a12"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#marble)"/>
  <!-- Fibonacci squares (outermost to innermost) -->
  <!-- 144 square -->
  <rect x="56" y="56" width="288" height="288" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <!-- 89 square -->
  <rect x="56" y="56" width="178" height="178" fill="none" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.2" stroke-linecap="round"/>
  <!-- 55 square -->
  <rect x="122" y="56" width="110" height="110" fill="none" stroke="#D4AF37" stroke-width="0.7" stroke-opacity="0.25" stroke-linecap="round"/>
  <!-- 34 square -->
  <rect x="122" y="122" width="68" height="68" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- 21 square -->
  <rect x="169" y="122" width="42" height="42" fill="none" stroke="#D4AF37" stroke-width="0.9" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- 13 square -->
  <rect x="169" y="147" width="26" height="26" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- 8 square -->
  <rect x="182" y="147" width="16" height="16" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- 5 square -->
  <rect x="182" y="153" width="10" height="10" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- 3 square -->
  <rect x="185" y="153" width="6" height="6" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.55" stroke-linecap="round"/>
  <!-- Golden spiral (quarter-circle arcs) -->
  <!-- Arc in 144 square -->
  <path d="M56 344 A288 288 0 0 1 344 56" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arc in 89 square -->
  <path d="M234 56 A178 178 0 0 1 56 234" fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arc in 55 square -->
  <path d="M122 166 A110 110 0 0 1 232 56" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Arc in 34 square -->
  <path d="M190 122 A68 68 0 0 1 122 190" fill="none" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arc in 21 square -->
  <path d="M169 164 A42 42 0 0 1 211 122" fill="none" stroke="url(#gold)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Arc in 13 square -->
  <path d="M195 147 A26 26 0 0 1 169 173" fill="none" stroke="url(#gold)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Arc in 8 square -->
  <path d="M182 163 A16 16 0 0 1 198 147" fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Arc in 5 square -->
  <path d="M192 153 A10 10 0 0 1 182 163" fill="none" stroke="url(#gold)" stroke-width="1" stroke-linecap="round"/>
  <!-- Arc in 3 square -->
  <path d="M185 159 A6 6 0 0 1 191 153" fill="none" stroke="url(#gold)" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Phi symbol at center (drawn as path, not text) -->
  <path d="M188 156 L188 162 M185 159 L191 159" fill="none" stroke="#F4E4BC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Decorative corner patterns -->
  <!-- Top-left -->
  <path d="M20 20 L20 50 M20 20 L50 20" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M25 25 L25 40 M25 25 L40 25" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <circle cx="20" cy="20" r="3" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Top-right -->
  <path d="M380 20 L380 50 M380 20 L350 20" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M375 25 L375 40 M375 25 L360 25" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <circle cx="380" cy="20" r="3" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom-left -->
  <path d="M20 380 L20 350 M20 380 L50 380" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M25 375 L25 360 M25 375 L40 375" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <circle cx="20" cy="380" r="3" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom-right -->
  <path d="M380 380 L380 350 M380 380 L350 380" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M375 375 L375 360 M375 375 L360 375" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <circle cx="380" cy="380" r="3" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Geometric corner accents -->
  <path d="M30 30 L35 30 L35 35" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M370 30 L365 30 L365 35" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M30 370 L35 370 L35 365" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M370 370 L365 370 L365 365" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>