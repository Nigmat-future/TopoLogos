<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="marble" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="60%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a12"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#marble)"/>
  <!-- Omphalos stone body -->
  <ellipse cx="300" cy="340" rx="110" ry="150" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="300" cy="340" rx="95" ry="135" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Net pattern on stone (sacred netting) -->
  <path d="M210 280 Q300 260 390 280" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M205 320 Q300 300 395 320" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M210 360 Q300 340 390 360" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M220 400 Q300 380 380 400" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M240 440 Q300 420 360 440" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Cracks on stone -->
  <path d="M270 220 L275 260 L265 290" fill="none" stroke="#F4E4BC" stroke-width="0.7" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M330 250 L325 280 L335 310" fill="none" stroke="#F4E4BC" stroke-width="0.7" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M280 370 L285 400 L278 430" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Serpent coiled around stone -->
  <path d="M195 430 C180 400 190 370 210 350 C230 330 250 340 260 310 C270 280 250 260 270 240 C290 220 310 230 320 210 C330 190 310 170 330 160" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <!-- Serpent head -->
  <path d="M330 160 C340 150 350 155 345 165 C340 170 330 168 330 160Z" fill="#D4AF37" stroke="#F4E4BC" stroke-width="1" stroke-linecap="round"/>
  <!-- Serpent eye -->
  <circle cx="338" cy="158" r="2" fill="#0f1320"/>
  <!-- Serpent tongue -->
  <path d="M345 160 L355 155 M345 160 L355 163" fill="none" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
  <!-- Spiral pattern on serpent body -->
  <path d="M200 420 C210 415 215 420 210 425" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M230 360 C240 355 245 360 240 365" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M265 300 C275 295 280 300 275 305" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M300 240 C310 235 315 240 310 245" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Base platform -->
  <path d="M220 490 L380 490 L370 510 L230 510 Z" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <path d="M240 510 L360 510 L355 520 L245 520 Z" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Radiating lines from omphalos (navel of the world) -->
  <line x1="300" y1="190" x2="300" y2="100" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="190" y1="340" x2="100" y2="340" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="410" y1="340" x2="500" y2="340" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="220" y1="250" x2="140" y2="180" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="380" y1="250" x2="460" y2="180" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- Corner ornaments -->
  <path d="M30 30 L30 70 M30 30 L70 30" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M570 30 L570 70 M570 30 L530 30" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M30 570 L30 530 M30 570 L70 570" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M570 570 L570 530 M570 570 L530 570" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>