  <path d="M200 530 Q160 510 200 490 Q240 470 200 450 Q160 430 200 410 Q240 390 200 370 Q160 350 200 330 Q240 310 200 290 Q160 270 200 250 Q240 230 200 210 Q170 195 175 170" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left serpent head -->
  <path d="M175 170 C168 160 172 150 180 155 C185 158 182 168 175 170Z" fill="#D4AF37" stroke="#F4E4BC" stroke-width="1" stroke-linecap="round"/>
