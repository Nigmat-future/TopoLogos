  <line x1="175" y1="310" x2="225" y2="310" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="175" y1="270" x2="225" y2="270" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="175" y1="230" x2="225" y2="230" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
