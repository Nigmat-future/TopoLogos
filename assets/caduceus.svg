<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="50%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="goldVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#marble)"/>
  <!-- Central staff -->
  <line x1="200" y1="100" x2="200" y2="540" stroke="url(#goldVert)" stroke-width="3" stroke-linecap="round"/>
  <!-- Staff orb at top -->
  <circle cx="200" cy="95" r="8" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="95" r="4" fill="#D4AF37" opacity="0.3"/>
  <!-- Wings at top -->
  <path d="M200 95 Q170 70 130 55 Q110 50 100 60 Q120 65 140 75 Q165 88 200 95" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <path d="M200 95 Q230 70 270 55 Q290 50 300 60 Q280 65 260 75 Q235 88 200 95" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Wing feather details left -->
