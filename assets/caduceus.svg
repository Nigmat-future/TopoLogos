  <path d="M25 25 L25 55 M25 25 L55 25" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M375 25 L375 55 M375 25 L345 25" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M25 575 L25 545 M25 575 L55 575" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M375 575 L375 545 M375 575 L345 575" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
