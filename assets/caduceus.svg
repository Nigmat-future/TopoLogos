  <path d="M30 30 L35 30 L35 35" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M370 30 L365 30 L365 35" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M30 570 L35 570 L35 565" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
  <path d="M370 570 L365 570 L365 565" fill="none" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>