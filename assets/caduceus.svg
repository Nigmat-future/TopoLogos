  <circle cx="215" cy="510" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="470" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="470" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="430" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="430" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="390" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="390" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="350" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="350" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="310" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="310" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="270" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="270" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="185" cy="230" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="215" cy="230" r="2" fill="#D4AF37" opacity="0.5"/>
