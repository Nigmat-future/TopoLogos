  <path d="M155 78 L142 72" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M170 88 L158 83" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Wing feather details right -->
