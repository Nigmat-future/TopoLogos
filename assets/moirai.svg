<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="50%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#marble)"/>
  <!-- Clotho (spinner) - left -->
  <circle cx="100" cy="120" r="10" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M100 130 L100 200 M90 145 L75 170 M110 145 L125 170 M100 200 L95 260 M100 200 L105 260" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Spindle -->
  <line x1="75" y1="80" x2="75" y2="170" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M65 80 L75 70 L85 80" fill="none" stroke="#D4AF37" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="75" cy="170" rx="12" ry="5" fill="none" stroke="#D4AF37" stroke-width="1" stroke-linecap="round"/>
  <!-- Spinning thread from spindle -->
  <path d="M75 165 Q85 155 95 145 Q105 135 110 130" fill="none" stroke="#F4E4BC" stroke-width="1" stroke-linecap="round"/>

  <!-- Lachesis (measurer) - center -->
  <circle cx="300" cy="120" r="10" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M300 130 L300 200 M290 145 L275 170 M310 145 L325 170 M300 200 L295 260 M300 200 L305 260" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Measuring rod -->
  <line x1="260" y1="160" x2="340" y2="160" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="270" y1="155" x2="270" y2="165" stroke="#F4E4BC" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="290" y1="155" x2="290" y2="165" stroke="#F4E4BC" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="310" y1="155" x2="310" y2="165" stroke="#F4E4BC" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="330" y1="155" x2="330" y2="165" stroke="#F4E4BC" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Atropos (cutter) - right -->
  <circle cx="500" cy="120" r="10" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M500 130 L500 200 M490 145 L475 170 M510 145 L525 170 M500 200 L495 260 M500 200 L505 260" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Shears -->
  <path d="M510 155 L530 140 L525 150 Z" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M510 155 L530 170 L525 160 Z" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="510" cy="155" r="2" fill="#D4AF37"/>

  <!-- Thread network (spatial transcriptomics graph) -->
  <!-- Main thread from Clotho to Lachesis -->
  <path d="M110 130 Q150 110 180 140 Q210 170 240 150 Q270 130 290 140" fill="none" stroke="#F4E4BC" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Main thread from Lachesis to Atropos -->
  <path d="M310 140 Q340 120 370 145 Q400 170 430 140 Q460 110 490 130" fill="none" stroke="#F4E4BC" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Branch threads forming network nodes -->
  <path d="M180 140 L170 100 L190 95" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M240 150 L250 105 L235 95" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M370 145 L360 100 L380 95" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M430 140 L440 100 L425 90" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Network nodes (spatial transcriptomics dots) -->
  <circle cx="180" cy="140" r="3" fill="#D4AF37" opacity="0.8"/>
  <circle cx="240" cy="150" r="3" fill="#D4AF37" opacity="0.8"/>
  <circle cx="370" cy="145" r="3" fill="#D4AF37" opacity="0.8"/>
  <circle cx="430" cy="140" r="3" fill="#D4AF37" opacity="0.8"/>
  <circle cx="170" cy="100" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="190" cy="95" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="250" cy="105" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="235" cy="95" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="360" cy="100" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="380" cy="95" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="440" cy="100" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <circle cx="425" cy="90" r="2.5" fill="#F4E4BC" opacity="0.6"/>
  <!-- Cross-connections (edges in the graph) -->
  <line x1="170" y1="100" x2="190" y2="95" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="250" y1="105" x2="235" y2="95" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="360" y1="100" x2="380" y2="95" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="440" y1="100" x2="425" y2="90" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="190" y1="95" x2="235" y2="95" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="380" y1="95" x2="425" y2="90" stroke="#D4AF37" stroke-width="0.4" stroke-opacity="0.3" stroke-linecap="round"/>
  <!-- Cut thread (Atropos has severed) -->
  <path d="M490 130 Q495 125 500 128" fill="none" stroke="#F4E4BC" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M500 132 Q505 138 510 135" fill="none" stroke="#F4E4BC" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Decorative border -->
  <path d="M20 20 L580 20 M20 280 L580 280" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M20 20 L20 40 M20 280 L20 260 M580 20 L580 40 M580 280 L580 260" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>