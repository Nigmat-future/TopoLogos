<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="The Moirai — weaving the spatial thread">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="50%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B28"/>
      <stop offset="50%" stop-color="#F4E4BC"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="robe1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d5a6e"/>
      <stop offset="100%" stop-color="#243442"/>
    </linearGradient>
    <linearGradient id="robe2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a4a6e"/>
      <stop offset="100%" stop-color="#342a42"/>
    </linearGradient>
    <linearGradient id="robe3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6e5a3d"/>
      <stop offset="100%" stop-color="#42342a"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d8c4a8"/>
      <stop offset="100%" stop-color="#a89070"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Spatial transcriptomics network -->
  <g stroke="#D4AF37" stroke-width="0.6" opacity="0.2">
    <line x1="280" y1="110" x2="420" y2="75"/>
    <line x1="420" y1="75" x2="580" y2="95"/>
    <line x1="580" y1="95" x2="720" y2="65"/>
    <line x1="280" y1="110" x2="360" y2="185"/>
    <line x1="360" y1="185" x2="500" y2="165"/>
    <line x1="500" y1="165" x2="580" y2="95"/>
    <line x1="500" y1="165" x2="640" y2="210"/>
    <line x1="640" y1="210" x2="780" y2="185"/>
    <line x1="720" y1="65" x2="780" y2="185"/>
    <line x1="360" y1="185" x2="420" y2="270"/>
    <line x1="420" y1="270" x2="640" y2="210"/>
    <line x1="200" y1="185" x2="280" y2="110"/>
    <line x1="200" y1="185" x2="360" y2="185"/>
    <line x1="780" y1="185" x2="880" y2="140"/>
    <line x1="880" y1="140" x2="950" y2="200"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="280" cy="110" r="5" fill="#D4AF37" opacity="0.75"/>
    <circle cx="420" cy="75" r="4" fill="#F4E4BC" opacity="0.6"/>
    <circle cx="580" cy="95" r="6" fill="#D4AF37" opacity="0.85"/>
    <circle cx="720" cy="65" r="4" fill="#9A7B28" opacity="0.6"/>
    <circle cx="360" cy="185" r="5" fill="#F4E4BC" opacity="0.7"/>
    <circle cx="500" cy="165" r="7" fill="#D4AF37" opacity="0.9"/>
    <circle cx="640" cy="210" r="5" fill="#9A7B28" opacity="0.7"/>
    <circle cx="780" cy="185" r="4" fill="#F4E4BC" opacity="0.65"/>
    <circle cx="420" cy="270" r="4" fill="#D4AF37" opacity="0.5"/>
    <circle cx="200" cy="185" r="3" fill="#9A7B28" opacity="0.5"/>
    <circle cx="880" cy="140" r="4" fill="#F4E4BC" opacity="0.55"/>
    <circle cx="950" cy="200" r="3" fill="#D4AF37" opacity="0.45"/>
  </g>

  <!-- Golden threads -->
  <path d="M140 175 Q300 95 500 80 Q700 65 920 100" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  <path d="M110 235 Q280 195 480 180 Q680 165 980 215" fill="none" stroke="url(#gold)" stroke-width="1.3" opacity="0.55"/>
  <path d="M150 300 Q350 265 520 250 Q690 235 900 275" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.35"/>

  <!-- Loom -->
  <rect x="460" y="50" width="280" height="10" rx="2" fill="#222836" opacity="0.6"/>
  <g stroke="#D4AF37" stroke-width="0.35" opacity="0.25">
    <line x1="480" y1="60" x2="480" y2="310"/>
    <line x1="510" y1="60" x2="510" y2="310"/>
    <line x1="540" y1="60" x2="540" y2="310"/>
    <line x1="570" y1="60" x2="570" y2="310"/>
    <line x1="600" y1="60" x2="600" y2="310"/>
    <line x1="630" y1="60" x2="630" y2="310"/>
    <line x1="660" y1="60" x2="660" y2="310"/>
    <line x1="690" y1="60" x2="690" y2="310"/>
    <line x1="720" y1="60" x2="720" y2="310"/>
  </g>

  <!-- Clotho -->
  <g transform="translate(120, 155)">
    <path d="M0 95 Q-12 50 18 28 Q38 12 48 32 L54 95Z" fill="url(#robe1)"/>
    <ellipse cx="34" cy="22" rx="17" ry="19" fill="url(#skin)"/>
    <path d="M18 12 Q34 -6 50 12" fill="none" stroke="#8a7040" stroke-width="2" opacity="0.5"/>
    <line x1="58" y1="35" x2="105" y2="12" stroke="#5a5040" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="108" cy="10" rx="10" ry="14" fill="#D4AF37" opacity="0.4" transform="rotate(-18 108 10)"/>
    <path d="M105 12 Q280 55 460 68" fill="none" stroke="url(#gold)" stroke-width="1.8"/>
    <path d="M48 42 Q62 30 72 18" fill="none" stroke="url(#skin)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Lachesis -->
  <g transform="translate(480, 135)">
    <path d="M0 110 Q-6 55 25 30 Q45 12 55 35 L60 110Z" fill="url(#robe2)"/>
    <ellipse cx="36" cy="24" rx="18" ry="20" fill="url(#skin)"/>
    <path d="M20 14 Q36 -6 52 14" fill="none" stroke="#8a7040" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="48" x2="140" y2="48" stroke="#D4AF37" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="78" y1="42" x2="78" y2="54" stroke="#F4E4BC" stroke-width="1"/>
    <line x1="100" y1="42" x2="100" y2="54" stroke="#F4E4BC" stroke-width="1"/>
    <line x1="122" y1="42" x2="122" y2="54" stroke="#F4E4BC" stroke-width="1"/>
    <path d="M52 45 Q95 22 130 42" fill="none" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>
    <path d="M55 62 Q100 55 150 65" fill="none" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Atropos -->
  <g transform="translate(920, 165)">
    <path d="M0 100 Q6 48 28 26 Q46 10 52 30 L56 100Z" fill="url(#robe3)"/>
    <ellipse cx="34" cy="20" rx="16" ry="18" fill="url(#skin)"/>
    <path d="M20 10 Q34 -6 48 10" fill="none" stroke="#8a7040" stroke-width="2" opacity="0.5"/>
    <g transform="translate(58, 38)">
      <circle cx="0" cy="0" r="5" fill="none" stroke="#D4AF37" stroke-width="1.8"/>
      <path d="M5 0 L28 -14 L28 14Z" fill="#8a7040" opacity="0.75"/>
      <path d="M0 5 L22 22 L22 32" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M0 -5 L22 -22 L22 -32" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <path d="M86 38 L180 55" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.45" stroke-dasharray="4 5"/>
    <path d="M58 42 Q35 58 12 78" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Labels -->
  <g fill="#D4AF37" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" opacity="0.4" text-anchor="middle">
    <text x="154" y="375">Clotho</text>
    <text x="516" y="375">Lachesis</text>
    <text x="954" y="375">Atropos</text>
  </g>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="360" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>
</svg>