<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="50%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="25%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="88%" cy="15%" r="25%">
      <stop offset="0%" stop-color="#F4E4BC" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#D4AF37" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#marble)"/>
  <!-- Cave ceiling -->
  <path d="M0 0 L0 120 Q100 80 200 130 Q300 60 400 100 Q500 50 600 90 Q700 40 800 80 Q900 30 1000 70 Q1100 50 1200 90 L1200 0 Z" fill="#0a0d16" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Cave walls -->
  <path d="M0 120 Q50 200 80 280 Q100 340 120 400 L0 400 Z" fill="#0d1020" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>
  <path d="M1200 90 Q1150 180 1120 260 Q1100 340 1080 400 L1200 400 Z" fill="#0d1020" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Fire glow -->
  <ellipse cx="280" cy="320" rx="200" ry="120" fill="url(#fireGlow)"/>
  <!-- Fire -->
  <path d="M260 340 Q265 300 270 280 Q275 300 280 270 Q285 295 290 260 Q295 290 300 340" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <path d="M265 340 Q270 310 275 295 Q280 310 285 280 Q290 305 295 340" fill="none" stroke="#F4E4BC" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Fire base -->
  <path d="M250 345 Q275 330 300 345" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Prisoner silhouettes (chained, facing wall) -->
  <!-- Prisoner 1 -->
  <path d="M380 280 L380 340 M370 290 L360 310 M390 290 L400 310 M380 340 L375 395 M380 340 L385 395" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <circle cx="380" cy="272" r="8" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Chain 1 -->
  <path d="M360 310 L340 315 L330 305" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Prisoner 2 -->
  <path d="M440 280 L440 340 M430 290 L420 310 M450 290 L460 310 M440 340 L435 395 M440 340 L445 395" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <circle cx="440" cy="272" r="8" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Chain 2 -->
  <path d="M420 310 L400 315 L390 305" fill="none" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Prisoner 3 -->
  <path d="M500 280 L500 340 M490 290 L480 310 M510 290 L520 310 M500 340 L495 395 M500 340 L505 395" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <circle cx="500" cy="272" r="8" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Shadows on wall (distorted projections) -->
  <path d="M600 250 Q620 200 640 250 Q660 220 680 260 Q700 230 720 270" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  <path d="M610 260 Q630 210 650 260 Q670 230 690 270" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.2" stroke-linecap="round"/>
  <!-- Wall surface -->
  <path d="M580 200 L580 400" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.15" stroke-linecap="round"/>
  <!-- Sun opening (top right) -->
  <ellipse cx="1050" cy="60" rx="120" ry="80" fill="url(#sunGlow)"/>
  <!-- Sun rays -->
  <line x1="1050" y1="60" x2="950" y2="120" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="1050" y1="60" x2="1000" y2="150" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="1050" y1="60" x2="1080" y2="140" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="1050" y1="60" x2="1120" y2="130" stroke="#F4E4BC" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <line x1="1050" y1="60" x2="980" y2="100" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.2" stroke-linecap="round"/>
  <line x1="1050" y1="60" x2="1100" y2="90" stroke="#F4E4BC" stroke-width="0.6" stroke-opacity="0.2" stroke-linecap="round"/>
  <!-- Ascending figure (escaping the cave) -->
  <path d="M920 200 L920 260 M910 215 L895 240 M930 215 L945 240 M920 260 L912 310 M920 260 L928 310" fill="none" stroke="#F4E4BC" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <circle cx="920" cy="192" r="8" fill="none" stroke="#F4E4BC" stroke-width="1.5" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Path from cave to light -->
  <path d="M580 300 Q700 250 800 200 Q860 170 920 200" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 6" stroke-linecap="round"/>
  <!-- Stalactites -->
  <path d="M150 130 L155 170" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M350 100 L355 140" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M550 85 L553 115" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M750 70 L753 100" fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round"/>
</svg>